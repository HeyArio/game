# Pretty, on-brand challenge links: quorumdaily.com/c/<id>
# =========================================================
#
# WHAT THIS DOES
#   Proxies  https://quorumdaily.com/c/<id>
#       ->   https://slrevdetzsbhhzrprkgf.supabase.co/functions/v1/challenge/<id>
#
#   so shared challenge links live on YOUR domain (trustworthy) while still
#   getting the personalised "X challenges you" link preview that the Supabase
#   `challenge` edge function renders. Without this, links fall back to a clean
#   but generic-preview  quorumdaily.com/?c=<id>  (still fine, just not as rich).
#
# HOW TO ENABLE  (on the VPS that serves quorumdaily.com)
#   1. Copy this block into the server { } of /etc/nginx/sites-enabled/quorumdaily,
#      alongside the existing SPA `root` / `location /`. (Or drop this file in and
#      `include` it from inside that server block.)
#   2. Test + reload:   nginx -t && systemctl reload nginx
#   3. In frontend/.env on the VPS, set:
#         VITE_CHALLENGE_LINK_BASE=https://quorumdaily.com/c
#   4. Redeploy the frontend:   bash deploy.sh
#
# Verify:  curl -sI https://quorumdaily.com/c/test | grep -i location   # should hit the function

location ~ ^/c/(?<cid>[A-Za-z0-9_-]+)/?$ {
    # A resolver is required because the upstream host is held in a variable.
    resolver 1.1.1.1 ipv6=off;
    set $quorum_fn "slrevdetzsbhhzrprkgf.supabase.co";

    proxy_pass https://$quorum_fn/functions/v1/challenge/$cid;
    proxy_ssl_server_name on;                 # send SNI so Supabase's TLS terminates
    proxy_set_header Host $quorum_fn;          # the function keys off the Host
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The preview is cacheable; a re-share refreshes within a few minutes.
    proxy_cache_valid 200 5m;
}
