# Pretty, on-brand challenge links: quorumdaily.com/c/<id>
# =========================================================
#
# WHAT THIS DOES
#   Proxies  https://quorumdaily.com/c/<id>
#       ->   https://slrevdetzsbhhzrprkgf.supabase.co/functions/v1/challenge/<id>
#
#   so shared challenge links live on YOUR domain (trustworthy) while still
#   getting the personalised "X challenges you" link preview that the Supabase
#   `challenge` edge function renders. Without this, links fall back to a clean
#   but generic-preview  quorumdaily.com/?c=<id>  (still fine, just not as rich).
#
# ⚠️  REQUIRES the headers-more nginx module (see WHY below):
#         sudo apt update && sudo apt install -y libnginx-mod-http-headers-more-filter
#     Without it, nginx -t fails with: unknown directive "more_set_headers".
#     After installing, RESTART nginx (not just reload) so the module loads.
#
# WHY headers-more / why the Content-Type rewrite
#   Supabase serves EVERY Edge Function response as `Content-Type: text/plain`
#   with `X-Content-Type-Options: nosniff` and `Content-Security-Policy:
#   default-src 'none'; sandbox` — a deliberate anti-abuse measure so nobody
#   hosts web pages / phishing on *.supabase.co. The consequence for us:
#     - browsers show the raw HTML source and never run the redirect, and
#     - social crawlers refuse to parse OG tags out of a text/plain body,
#       so the link unfurls with NO card.
#   nginx's own `proxy_hide_header Content-Type` CANNOT fix this: Content-Type
#   is special-cased in the proxy module and is copied to the response no matter
#   what (proxy_hide_header / default_type are no-ops for it). The headers-more
#   module's `more_set_headers` is the one reliable way to overwrite it.
#
# HOW TO ENABLE  (on the VPS that serves quorumdaily.com)
#   1. Install the module (above), then paste the `location ~ ^/c/...` block
#      below INSIDE the server { } block of /etc/nginx/sites-enabled/quorumdaily,
#      alongside the existing `root` / `location /`. It must nest like this:
#
#          server {
#              listen 443 ssl;
#              server_name quorumdaily.com;
#              root /var/www/quorumdaily;
#
#              location / { try_files $uri $uri/ /index.html; }   # existing SPA route
#
#              location ~ ^/c/(?<cid>[A-Za-z0-9_-]+)/?$ { ... }   # <-- this block
#          }
#
#      (Or drop this file somewhere and `include` it — but the `include` line
#      itself must also be INSIDE that server { } block.)
#      Find the right file with:  grep -RIl "root /var/www/quorumdaily" /etc/nginx/
#   2. Test + restart:   nginx -t && systemctl restart nginx
#   3. In frontend/.env on the VPS, set:
#         VITE_CHALLENGE_LINK_BASE=https://quorumdaily.com/c
#   4. Redeploy the frontend:   bash deploy.sh
#
# Verify the Content-Type rewrite is live (this is the bit that breaks silently):
#   curl -sD - -o /dev/null https://quorumdaily.com/c/test | grep -i '^content-type'
#     Content-Type: text/html; charset=utf-8   -> working
#     Content-Type: text/plain                 -> module not loaded / block not applied
#
# TROUBLESHOOTING
#   nginx: [emerg] unknown directive "more_set_headers"
#     -> headers-more module isn't installed/loaded. apt install the package
#        above, then `systemctl restart nginx` (restart, not reload).
#   nginx: [emerg] "location" directive is not allowed here in .../nginx.conf:NN
#     -> You pasted the block at the top level (http/main context) instead of
#        inside a server { } block. Move it into the server { } of your site
#        config (/etc/nginx/sites-enabled/quorumdaily), NOT into nginx.conf.
#   Link shows raw HTML / no card, content-type is text/plain
#     -> the more_set_headers line isn't taking effect (module missing, or the
#        request is matching a different location). Confirm with the curl above.

location ~ ^/c/(?<cid>[A-Za-z0-9_-]+)/?$ {
    # A resolver is required because the upstream host is held in a variable.
    resolver 1.1.1.1 ipv6=off;
    set $quorum_fn "slrevdetzsbhhzrprkgf.supabase.co";

    proxy_pass https://$quorum_fn/functions/v1/challenge/$cid;
    proxy_ssl_server_name on;                 # send SNI so Supabase's TLS terminates
    proxy_set_header Host $quorum_fn;          # the function keys off the Host
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rewrite Supabase's forced text/plain + sandbox CSP + nosniff into real
    # HTML, so browsers render/redirect and crawlers read the OG card. Requires
    # the headers-more module (see header comment). proxy_hide_header CANNOT do
    # this for Content-Type — it is special-cased in nginx's proxy module.
    more_set_headers "Content-Type: text/html; charset=utf-8";
    more_clear_headers "Content-Security-Policy";
    more_clear_headers "X-Content-Type-Options";
}
